services:
  db:
    image: postgres:16-alpine
    container_name: loan-over-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-loanover}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loanover}
      POSTGRES_DB: ${DB_NAME:-loanover}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
